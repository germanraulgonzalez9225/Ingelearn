document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"3a99a215-d45a-4804-8b7e-f6205e922e18\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  @keyframes flowdash{ to { stroke-dashoffset:-160; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"min-height:100vh;background:radial-gradient(120% 120% at 50% 0%, #103047 0%, #0b1d2a 55%, #081621 100%);color:#dce8f0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;padding:18px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;overflow:auto\">\n\n  <!-- HEADER -->\n  <div style=\"width:100%;max-width:900px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap\">\n    <h1 style=\"margin:0;font-size:19px;font-weight:600;letter-spacing:-0.2px;color:#f1f8fc\">Tanques de agua &amp; circuito eléctrico<\u002Fh1>\n    {{ phasesEl }}\n  <\u002Fdiv>\n\n  <!-- DIAGRAMS -->\n  <div style=\"width:100%;max-width:900px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:center\">\n\n    <!-- HYDRAULIC -->\n    <div style=\"flex:1 1 320px;background:rgba(16,42,60,0.55);border:1px solid rgba(63,184,224,0.18);border-radius:12px;padding:12px 12px 8px\">\n      <div style=\"font-size:12px;font-weight:600;color:#bfe0ef;margin-bottom:4px\">Tanques de agua<\u002Fdiv>\n      <svg viewBox=\"0 0 380 230\" style=\"width:100%;height:auto;display:block\">\n        <!-- support stand under elevated tank A -->\n        <line x1=\"52\" y1=\"120\" x2=\"52\" y2=\"206\" stroke=\"#395067\" stroke-width=\"3\"><\u002Fline>\n        <line x1=\"103\" y1=\"120\" x2=\"103\" y2=\"206\" stroke=\"#395067\" stroke-width=\"3\"><\u002Fline>\n        <line x1=\"40\" y1=\"206\" x2=\"118\" y2=\"206\" stroke=\"#395067\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fline>\n        <!-- tank A (elevated) walls -->\n        <line x1=\"40\" y1=\"20\" x2=\"40\" y2=\"120\" stroke=\"#3fb8e0\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline>\n        <line x1=\"115\" y1=\"20\" x2=\"115\" y2=\"120\" stroke=\"#3fb8e0\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline>\n        <line x1=\"38\" y1=\"120\" x2=\"117\" y2=\"120\" stroke=\"#3fb8e0\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline>\n        <!-- tank B (low) walls -->\n        <line x1=\"265\" y1=\"95\" x2=\"265\" y2=\"195\" stroke=\"#3fb8e0\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline>\n        <line x1=\"340\" y1=\"95\" x2=\"340\" y2=\"195\" stroke=\"#3fb8e0\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline>\n        <line x1=\"263\" y1=\"195\" x2=\"342\" y2=\"195\" stroke=\"#3fb8e0\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline>\n        <!-- connector pipe -->\n        <path d=\"M77 120 L77 213 L302 213 L302 195\" fill=\"none\" stroke=\"#e0a73f\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <!-- water -->\n        {{ waterAEl }}\n        {{ waterBEl }}\n        <!-- flow overlay -->\n        {{ flowEl }}\n        <!-- pipe constriction (resistance) -->\n        {{ constrictionEl }}\n        <!-- height difference -->\n        {{ diffEl }}\n        <!-- valve -->\n        <rect x=\"174\" y=\"200\" width=\"32\" height=\"26\" rx=\"4\" fill=\"#0e2536\" stroke=\"#e0a73f\" stroke-width=\"2.5\"><\u002Frect>\n        {{ valveEl }}\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- badge -->\n    <div style=\"flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px\">\n      <div style=\"width:38px;height:38px;border-radius:50%;background:rgba(63,184,224,0.12);border:1px solid rgba(63,184,224,0.35);display:flex;align-items:center;justify-content:center;font-size:18px;color:#8fe6ff\">≈<\u002Fdiv>\n      <span style=\"font-size:10px;color:#5e89a3\">igual que<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- CIRCUIT -->\n    <div style=\"flex:1 1 320px;background:rgba(16,42,60,0.55);border:1px solid rgba(63,184,224,0.18);border-radius:12px;padding:12px 12px 8px\">\n      <div style=\"font-size:12px;font-weight:600;color:#bfe0ef;margin-bottom:4px\">Circuito eléctrico<\u002Fdiv>\n      <svg viewBox=\"0 0 380 230\" style=\"width:100%;height:auto;display:block\">\n        <!-- wires -->\n        <path d=\"M80 55 L300 55 L300 195 L80 195 Z\" fill=\"none\" stroke=\"#cfe6f2\" stroke-width=\"5\" stroke-linejoin=\"round\"><\u002Fpath>\n        <!-- electron flow -->\n        {{ electronEl }}\n        <!-- resistor (resistance) -->\n        {{ resistorEl }}\n        <!-- battery -->\n        <rect x=\"62\" y=\"113\" width=\"36\" height=\"24\" fill=\"#0b1d2a\"><\u002Frect>\n        <line x1=\"68\" y1=\"118\" x2=\"92\" y2=\"118\" stroke=\"#8fe6ff\" stroke-width=\"2.5\"><\u002Fline>\n        <line x1=\"74\" y1=\"129\" x2=\"86\" y2=\"129\" stroke=\"#8fe6ff\" stroke-width=\"6\"><\u002Fline>\n        <text x=\"52\" y=\"168\" fill=\"#5e89a3\" font-size=\"11\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\">pila<\u002Ftext>\n        <!-- bulb -->\n        {{ bulbEl }}\n        <circle cx=\"190\" cy=\"55\" r=\"17\" fill=\"#0b1d2a\" stroke=\"#cfe6f2\" stroke-width=\"3\"><\u002Fcircle>\n        <line x1=\"181\" y1=\"48\" x2=\"199\" y2=\"62\" stroke=\"#cfe6f2\" stroke-width=\"2\"><\u002Fline>\n        <line x1=\"199\" y1=\"48\" x2=\"181\" y2=\"62\" stroke=\"#cfe6f2\" stroke-width=\"2\"><\u002Fline>\n        <text x=\"190\" y=\"25\" fill=\"#5e89a3\" font-size=\"11\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\">bombilla<\u002Ftext>\n        <!-- switch -->\n        <circle cx=\"170\" cy=\"195\" r=\"3.5\" fill=\"#cfe6f2\"><\u002Fcircle>\n        <circle cx=\"210\" cy=\"195\" r=\"3.5\" fill=\"#cfe6f2\"><\u002Fcircle>\n        {{ switchEl }}\n        <text x=\"190\" y=\"220\" fill=\"#5e89a3\" font-size=\"11\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\">interruptor<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- NARRATION -->\n  <div style=\"width:100%;max-width:900px;background:rgba(16,42,60,0.5);border:1px solid rgba(63,184,224,0.16);border-radius:12px;padding:14px 18px;display:flex;flex-direction:column;gap:12px\">\n\n    <sc-if value=\"{{ showStory }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <span style=\"align-self:flex-start;background:rgba(63,184,224,0.14);border-radius:999px;padding:3px 11px;font-size:11px;font-weight:600;letter-spacing:0.5px;color:#8fe6ff;text-transform:uppercase\">{{ phaseChip }}<\u002Fspan>\n        <h2 style=\"margin:0;font-size:17px;font-weight:600;color:#f1f8fc\">{{ title }}<\u002Fh2>\n        <p style=\"margin:0;font-size:14px;line-height:1.55;color:#b9d2e0;max-width:760px;text-wrap:pretty\">{{ text }}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showSummary }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:8px\">\n        <h2 style=\"margin:0 0 2px;font-size:17px;font-weight:600;color:#f1f8fc\">El agua y la electricidad se parecen<\u002Fh2>\n        <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(8,22,33,0.5);border:1px solid rgba(63,184,224,0.12);border-radius:9px\">\n            <span style=\"flex:1;font-size:13px;color:#8fe6ff\">{{ row.water }}<\u002Fspan>\n            <span style=\"flex:0 0 auto;color:#5e89a3\">→<\u002Fspan>\n            <span style=\"flex:1;font-size:13px;color:#f0c178;text-align:right\">{{ row.elec }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showCombo }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <span style=\"align-self:flex-start;background:rgba(63,184,224,0.14);border-radius:999px;padding:3px 11px;font-size:11px;font-weight:600;letter-spacing:0.5px;color:#8fe6ff;text-transform:uppercase\">Conjunto<\u002Fspan>\n        <h2 style=\"margin:0;font-size:17px;font-weight:600;color:#f1f8fc\">{{ title }}<\u002Fh2>\n        {{ comboEl }}\n        <p style=\"margin:0;font-size:14px;line-height:1.55;color:#b9d2e0;max-width:760px;text-wrap:pretty\">{{ text }}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showControls }}\" hint-placeholder-val=\"{{ false }}\">\n      {{ controlsEl }}\n    <\u002Fsc-if>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;border-top:1px solid rgba(63,184,224,0.12);padding-top:12px\">\n      {{ prevEl }}\n      <span style=\"font-size:12px;color:#5e89a3;font-family:ui-monospace,Menlo,monospace\">{{ counter }}<\u002Fspan>\n      {{ nextEl }}\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { step: 0, ov: { tension: 0.7, open: 0, narrow: 0 } };\n\n  seed(s){ const c=(v,a,b)=>Math.max(a,Math.min(b,v)); return { tension:c((s.levelA-0.55)/0.40,0,1), open:s.open, narrow:s.narrow||0 }; }\n  setStep(i){ const j=Math.max(0,Math.min(this.steps.length-1,i)); this.setState({ step:j, ov:this.seed(this.steps[j]) }); }\n  setKnob(name,val){ this.setState(st=>({ ov:{ ...st.ov, [name]:val } })); }\n\n  steps = [\n    { phase:0, mode:'story', levelA:0.80, levelB:0.35, open:0, narrow:0, showDiff:true,\n      title:'La diferencia de altura es la tensión',\n      text:'Los dos tanques están a distinta altura y el agua a distinto nivel. Esa diferencia de altura es lo que llamamos tensión.' },\n    { phase:0, mode:'story', levelA:0.95, levelB:0.20, open:0, narrow:0, showDiff:true, controls:['tension'],\n      title:'Más diferencia, más tensión',\n      text:'Cuanto mayor es la diferencia de altura entre el agua de los dos tanques, mayor es la tensión.' },\n    { phase:1, mode:'story', levelA:0.70, levelB:0.45, open:0.5, narrow:0, showDiff:false,\n      title:'El agua que fluye es la corriente',\n      text:'Al abrir la válvula, el agua baja del tanque alto al bajo. Ese movimiento del agua es la corriente, y la bombilla se enciende.' },\n    { phase:1, mode:'story', levelA:0.70, levelB:0.45, open:1, narrow:0, showDiff:false, controls:['open'],\n      title:'Si abrís más, pasa más corriente',\n      text:'Cuanto más abrís la válvula, más agua pasa: la corriente aumenta y la bombilla brilla más.' },\n    { phase:2, mode:'story', levelA:0.70, levelB:0.45, open:1, narrow:0.55, showDiff:false,\n      title:'Un caño estrecho frena el agua',\n      text:'Si el caño es más estrecho, al agua le cuesta más pasar: aunque la válvula esté abierta, fluye menos. Eso es la resistencia, y la bombilla brilla menos.' },\n    { phase:2, mode:'story', levelA:0.70, levelB:0.45, open:1, narrow:0.85, showDiff:false, controls:['narrow'],\n      title:'Más estrecho, más resistencia',\n      text:'Cuanto más estrecho es el caño, mayor es la resistencia y menos corriente pasa. En el circuito, una resistencia más grande deja pasar menos corriente.' },\n    { phase:3, mode:'summary', levelA:0.70, levelB:0.45, open:1, narrow:0.4, showDiff:true,\n      title:'Las tres fuerzas', text:'' },\n    { phase:3, mode:'combo', active:'tension', levelA:0.92, levelB:0.22, open:0, narrow:0, showDiff:true, controls:['tension'],\n      title:'Paso 1 · La tensión empuja',\n      text:'Todo empieza con la tensión: la diferencia de altura del agua (la pila) que empuja. Sin empuje, nada se movería.' },\n    { phase:3, mode:'combo', active:'resistencia', levelA:0.70, levelB:0.45, open:1, narrow:0.78, showDiff:false, controls:['narrow'],\n      title:'Paso 2 · La resistencia frena',\n      text:'El caño estrecho (la resistencia) decide cuánto cuesta pasar. Cuanto más estrecho, más frena el agua.' },\n    { phase:3, mode:'combo', active:'corriente', levelA:0.70, levelB:0.45, open:1, narrow:0.1, showDiff:true, controls:['tension','narrow'], result:true,\n      title:'Paso 3 · La corriente es el resultado',\n      text:'La corriente que fluye depende de las otras dos: más tensión y menos resistencia hacen pasar más corriente. Cambiá una y las demás responden.' },\n  ];\n\n  phaseNames = ['Tensión', 'Corriente', 'Resistencia', 'Conjunto'];\n  phaseStarts = [0, 2, 4, 6];\n\n  rows = [\n    { water:'Diferencia de altura', elec:'Tensión' },\n    { water:'Agua que fluye', elec:'Corriente' },\n    { water:'Caño estrecho', elec:'Resistencia' },\n    { water:'Llave de paso', elec:'Interruptor' },\n  ];\n\n  go(i){ this.setStep(i); }\n\n  renderVals(){\n    const h = React.createElement;\n    const i = this.state.step;\n    const s = this.steps[i];\n    const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));\n    const ov = this.state.ov || this.seed(s);\n    const ctrl = s.controls || [];\n    const has = (k)=>ctrl.includes(k);\n    // effective magnitudes — sliders override the step defaults on controllable slides\n    let levelA = s.levelA, levelB = s.levelB;\n    if (has('tension')) { levelA = 0.55 + ov.tension*0.40; levelB = Math.max(0.08, 0.55 - ov.tension*0.33); }\n    const open = has('open') ? ov.open : s.open;\n    const narrow = has('narrow') ? ov.narrow : (s.narrow||0);\n    // tank A inner: y 24..116 (h92), tank B inner: y 99..191 (h92)\n    const HH = 92;\n    const surfA = 116 - levelA * HH;\n    const surfB = 191 - levelB * HH;\n    const waterTr = (lvl)=>({ transform:`scaleY(${lvl})`, transformOrigin:'bottom', transformBox:'fill-box', transition:'transform .7s ease' });\n\n    // phase pills\n    const pillBase = { border:'1px solid', borderRadius:'999px', padding:'6px 14px', fontSize:'12px', fontWeight:600, cursor:'pointer', transition:'all .2s ease', fontFamily:'inherit', whiteSpace:'nowrap' };\n    const phasesEl = h('div',{ style:{ display:'flex', gap:'8px', flexWrap:'wrap' } },\n      this.phaseNames.map((n,idx)=>{\n        const active = idx === s.phase;\n        return h('button',{ key:idx, onClick:()=>this.go(this.phaseStarts[idx]),\n          style: active\n            ? { ...pillBase, background:'#3fb8e0', borderColor:'#3fb8e0', color:'#08161f' }\n            : { ...pillBase, background:'rgba(63,184,224,0.06)', borderColor:'rgba(63,184,224,0.25)', color:'#8fb6cc' } }, n);\n      })\n    );\n\n    // water in tanks\n    const waterAEl = h('rect',{ x:46, y:24, width:63, height:HH, rx:2, fill:'#2b8fd0', style:waterTr(levelA) });\n    const waterBEl = h('rect',{ x:271, y:99, width:63, height:HH, rx:2, fill:'#2b8fd0', style:waterTr(levelB) });\n\n    // effective current: valve opening, narrowness and (in conjunto) tension\n    const flowOn = open > 0;\n    const cur = !flowOn ? 0 : (has('tension')\n      ? clamp(open*(0.25 + 0.75*ov.tension)*(1 - narrow*0.6), 0, 1)\n      : open*(1 - narrow*0.62));\n    const durFlow = (1.6 - cur * 0.9) + 's';\n    const flowEl = h('path',{ d:'M77 120 L77 213 L302 213 L302 195', fill:'none', stroke:'#8fe6ff', strokeWidth: 3 + cur*3, strokeLinecap:'round', strokeDasharray:'5 13',\n      style:{ opacity: flowOn ? 0.95 : 0, animationName:'flowdash', animationDuration:durFlow, animationTimingFunction:'linear', animationIterationCount:'infinite', transition:'opacity .4s ease, stroke-width .4s ease' } });\n\n    // pipe constriction (resistance) — protrudes into the pipe; bigger = more resistance\n    const pp = 3 + narrow*2.6;\n    const constrictionEl = narrow>0 ? h('g',null,\n      h('polygon',{ points:`227,206 253,206 240,${(206+pp).toFixed(1)}`, fill:'#e0a73f', style:{transition:'all .4s ease'} }),\n      h('polygon',{ points:`227,220 253,220 240,${(220-pp).toFixed(1)}`, fill:'#e0a73f', style:{transition:'all .4s ease'} }),\n      h('text',{ x:240, y:236, fill:'#f0a072', fontSize:11, textAnchor:'middle', fontFamily:'Helvetica,Arial' }, 'caño estrecho')\n    ) : null;\n\n    // height-difference indicator\n    const mid = (surfA + surfB) / 2;\n    const diffEl = !s.showDiff ? null : h('g',null,\n      h('line',{ x1:115, y1:surfA, x2:190, y2:surfA, stroke:'#ffd27f', strokeWidth:1.5, strokeDasharray:'4 4', opacity:0.7 }),\n      h('line',{ x1:190, y1:surfB, x2:265, y2:surfB, stroke:'#ffd27f', strokeWidth:1.5, strokeDasharray:'4 4', opacity:0.7 }),\n      h('line',{ x1:190, y1:surfA, x2:190, y2:surfB, stroke:'#ffd27f', strokeWidth:2 }),\n      h('polygon',{ points:`190,${surfA-1} 186,${surfA+7} 194,${surfA+7}`, fill:'#ffd27f' }),\n      h('polygon',{ points:`190,${surfB+1} 186,${surfB-7} 194,${surfB-7}`, fill:'#ffd27f' }),\n      h('text',{ x:198, y:mid+4, fill:'#ffd27f', fontSize:11, fontFamily:'Helvetica,Arial' }, 'tensión')\n    );\n\n    // valve — handle rotates from vertical (closed) to horizontal (open); fill grows with openness\n    const cx = 190, cy = 213, len = 15;\n    const th = open * Math.PI/2; // 0 = vertical, 90deg = horizontal\n    const dx = Math.sin(th)*len, dy = Math.cos(th)*len;\n    const fw = open * 22;\n    const valveEl = h('g',null,\n      open>0 ? h('rect',{ x:cx-fw/2, y:cy-6, width:fw, height:12, rx:2, fill:'#8fe6ff', opacity:0.85, style:{transition:'all .4s ease'} }) : null,\n      h('line',{ x1:cx-dx, y1:cy-dy, x2:cx+dx, y2:cy+dy, stroke: open>0 ? '#cdeefe' : '#e0573f', strokeWidth:4, strokeLinecap:'round', style:{transition:'all .4s ease'} })\n    );\n\n    // circuit — brighter bulb & faster electrons when valve more open\n    const electronEl = h('path',{ d:'M80 55 L300 55 L300 195 L80 195 Z', fill:'none', stroke:'#8fe6ff', strokeWidth: 3 + cur*2.5, strokeDasharray:'4 12', strokeLinecap:'round',\n      style:{ opacity: flowOn ? 0.95 : 0, animationName:'flowdash', animationDuration:durFlow, animationTimingFunction:'linear', animationIterationCount:'infinite', transition:'opacity .4s ease' } });\n    const bulbEl = h('circle',{ cx:190, cy:55, r: 18 + cur*9, fill:'#ffd86b',\n      style:{ opacity: flowOn ? (0.28 + cur*0.57) : 0, transition:'opacity .45s ease, r .45s ease' } });\n\n    // resistor symbol on the right wire — shown when the pipe is narrow\n    const resistorEl = narrow>0 ? h('g',null,\n      h('rect',{ x:294, y:101, width:12, height:48, fill:'#0b1d2a' }),\n      h('path',{ d:'M300 101 L300 106 L293 110 L307 117 L293 124 L307 131 L293 138 L300 143 L300 149', fill:'none', stroke:'#f0a072', strokeWidth:3, strokeLinecap:'round', strokeLinejoin:'round' }),\n      h('text',{ x:328, y:128, fill:'#f0a072', fontSize:11, textAnchor:'middle', fontFamily:'Helvetica,Arial' }, 'resistencia')\n    ) : null;\n\n    // three-forces cards for the \"Conjunto\" step-by-step slides\n    const forces = [\n      { key:'tension', label:'Tensión', desc:'El empuje', color:'#ffd27f', bg:'rgba(255,210,127,0.12)' },\n      { key:'resistencia', label:'Resistencia', desc:'El freno', color:'#f0a072', bg:'rgba(240,160,114,0.12)' },\n      { key:'corriente', label:'Corriente', desc:'Lo que fluye', color:'#8fe6ff', bg:'rgba(63,184,224,0.12)' },\n    ];\n    const comboEl = h('div',{ style:{ display:'flex', gap:'10px', flexWrap:'wrap' } },\n      forces.map(f=>{\n        const on = s.active==='all' || s.active===f.key;\n        return h('div',{ key:f.key, style:{ flex:'1 1 150px', background: on?f.bg:'rgba(8,22,33,0.4)', border:'1px solid '+(on?f.color:'rgba(63,184,224,0.12)'), borderRadius:'10px', padding:'10px 13px', opacity:on?1:0.4, transition:'all .35s ease' } },\n          h('div',{ style:{ fontSize:'14px', fontWeight:700, color: on?f.color:'#5e89a3', marginBottom:'2px' } }, f.label),\n          h('div',{ style:{ fontSize:'12px', color:'#b9d2e0' } }, f.desc)\n        );\n      })\n    );\n    const switchEl = flowOn\n      ? h('line',{ x1:170, y1:195, x2:210, y2:195, stroke:'#8fe6ff', strokeWidth:4, strokeLinecap:'round' })\n      : h('line',{ x1:170, y1:195, x2:204, y2:176, stroke:'#e0a73f', strokeWidth:4, strokeLinecap:'round' });\n\n    // magnitude sliders\n    const knobMeta = {\n      tension:{ label:'Tensión · diferencia de altura', color:'#ffd27f' },\n      open:{ label:'Apertura de la válvula', color:'#8fe6ff' },\n      narrow:{ label:'Estrechez del caño · resistencia', color:'#f0a072' },\n    };\n    const sliderRow = (k)=>{\n      const m=knobMeta[k]; const v=ov[k];\n      return h('div',{ key:k, style:{ display:'flex', flexDirection:'column', gap:'4px' } },\n        h('div',{ style:{ display:'flex', justifyContent:'space-between', fontSize:'12px' } },\n          h('span',{ style:{ color:m.color, fontWeight:600 } }, m.label),\n          h('span',{ style:{ color:'#8fb6cc', fontFamily:'ui-monospace,Menlo,monospace' } }, Math.round(v*100)+'%')\n        ),\n        h('input',{ type:'range', min:0, max:1, step:0.01, value:v,\n          onChange:(e)=>this.setKnob(k, parseFloat(e.target.value)),\n          style:{ width:'100%', accentColor:m.color, cursor:'pointer' } })\n      );\n    };\n    const resultRow = s.result ? h('div',{ style:{ display:'flex', flexDirection:'column', gap:'5px', marginTop:'2px', paddingTop:'10px', borderTop:'1px dashed rgba(63,184,224,0.18)' } },\n      h('div',{ style:{ display:'flex', justifyContent:'space-between', fontSize:'12px' } },\n        h('span',{ style:{ color:'#bfe0ef', fontWeight:700 } }, 'Corriente · resultado'),\n        h('span',{ style:{ color:'#8fe6ff', fontFamily:'ui-monospace,Menlo,monospace' } }, Math.round(cur*100)+'%')\n      ),\n      h('div',{ style:{ height:'9px', background:'rgba(8,22,33,0.6)', borderRadius:'6px', overflow:'hidden' } },\n        h('div',{ style:{ width:(cur*100)+'%', height:'100%', background:'#8fe6ff', transition:'width .3s ease' } })\n      )\n    ) : null;\n    const controlsEl = ctrl.length ? h('div',{ style:{ display:'flex', flexDirection:'column', gap:'11px', background:'rgba(8,22,33,0.4)', border:'1px solid rgba(63,184,224,0.14)', borderRadius:'10px', padding:'12px 14px' } },\n      h('div',{ style:{ fontSize:'11px', letterSpacing:'0.5px', textTransform:'uppercase', color:'#5e89a3', fontWeight:600 } }, 'Probá variando las magnitudes'),\n      ...ctrl.map(sliderRow),\n      resultRow\n    ) : null;\n\n    // controls\n    const isFirst = i === 0, isLast = i === this.steps.length - 1;\n    const btn = (d)=>({ background: d?'rgba(63,184,224,0.05)':'rgba(63,184,224,0.16)', border:'1px solid '+(d?'rgba(63,184,224,0.12)':'rgba(63,184,224,0.4)'), color:d?'#3e5a6c':'#bfe0ef', borderRadius:'9px', padding:'9px 16px', fontSize:'13px', fontWeight:600, cursor:d?'default':'pointer', fontFamily:'inherit', transition:'all .2s ease' });\n    const prevEl = h('button',{ onClick:()=>this.setState(st=>({ step:Math.max(0,st.step-1) })), disabled:isFirst, style:btn(isFirst) }, '← Anterior');\n    const nextEl = h('button',{ onClick:()=>this.setState(st=>({ step:Math.min(this.steps.length-1,st.step+1) })), disabled:isLast, style:btn(isLast) }, 'Siguiente →');\n\n    return {\n      phasesEl, waterAEl, waterBEl, flowEl, constrictionEl, diffEl, valveEl,\n      electronEl, resistorEl, bulbEl, switchEl, comboEl, controlsEl, prevEl, nextEl,\n      phaseChip: this.phaseNames[s.phase],\n      title: s.title, text: s.text,\n      showStory: s.mode==='story', showSummary: s.mode==='summary', showCombo: s.mode==='combo',\n      showControls: ctrl.length>0,\n      rows: this.rows,\n      counter: `${i+1} / ${this.steps.length}`,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
