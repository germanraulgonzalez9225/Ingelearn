<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingelearn · Ley de Ohm — Simulador interactivo</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
  :root{
    --azul:#2BA1E6;
    --azul-osc:#185FA5;
    --rojo:#E24B4A;
    --gris-txt:#555555;
    --negro:#1c1c1c;
    --bg:#ffffff;
    --card:#f6f9fc;
    --borde:#e1e8ef;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:'Calibri','Segoe UI',system-ui,sans-serif;
    background:var(--bg);
    color:var(--negro);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 40px;
    min-height:100%;
  }
  .marca{
    display:flex; align-items:center; justify-content:center; margin-bottom:10px;
  }
  .marca img{
    height:64px; width:auto; display:block;
  }
  h1{
    font-family:'Anton',sans-serif; text-transform:uppercase; letter-spacing:1px;
    font-size:40px; line-height:1.05; text-align:center; margin-bottom:4px;
  }
  h1 .l1{ color:var(--negro); }
  h1 .l2{ color:var(--azul); }
  .sub{ color:var(--gris-txt); font-size:15px; margin-bottom:18px; text-align:center; }

  .panel{
    width:100%; max-width:760px;
    background:var(--card);
    border:1px solid var(--borde);
    border-radius:18px;
    padding:22px 26px 26px;
    box-shadow:0 6px 26px rgba(24,95,165,.06);
  }

  .seg{ display:inline-flex; border:1px solid var(--borde); border-radius:10px; overflow:hidden; margin-bottom:14px; }
  .seg button{
    border:none; background:#fff; color:var(--gris-txt);
    padding:9px 18px; font-size:14px; font-weight:600; cursor:pointer;
    font-family:inherit; transition:background .15s,color .15s;
  }
  .seg button:hover{ background:#eef4fa; }
  .seg button.on{ background:var(--azul); color:#fff; }

  svg{ width:100%; height:auto; display:block; }
  .th{ font-family:'Calibri',sans-serif; font-weight:700; font-size:14px; }
  .t{ font-family:'Calibri',sans-serif; font-size:14px; }
  .ts{ font-family:'Calibri',sans-serif; font-size:12px; }

  .controls{ display:flex; flex-direction:column; gap:16px; margin-top:16px; }
  .row{ display:flex; align-items:center; gap:14px; }
  .row label{ width:140px; font-size:15px; font-weight:600; color:var(--negro); }
  .row input[type=range]{
    flex:1; accent-color:var(--azul); cursor:pointer; height:6px;
  }
  .val{ min-width:78px; text-align:right; font-weight:700; font-size:16px; color:var(--azul-osc); }

  .msg{
    margin-top:16px; padding:13px 16px; border-radius:10px;
    background:#eef4fa; font-size:14px; line-height:1.55; color:#234;
    border-left:4px solid var(--azul);
  }
  .msg.warn{ background:#fdecec; border-left-color:var(--rojo); }
  .msg.warn b{ color:#A32D2D; }

  .pie{ margin-top:18px; font-size:12px; color:#9aa6b2; text-align:center; }

  @media (max-width:520px){
    h1{ font-size:30px; }
    .row label{ width:104px; font-size:13px; }
    .panel{ padding:18px 16px 22px; }
  }
</style>
</head>

        <line x1="190" y1="240" x2="150" y2="240" stroke="#2BA1E6" stroke-width="2.5" marker-end="url(#aIEL)"/>
        <line x1="360" y1="150" x2="360" y2="200" stroke="#2BA1E6" stroke-width="2.5" marker-end="url(#aIEL)"/>
      </g>

      <!-- Lámpara -->
      <circle id="glow" cx="270" cy="110" r="30" fill="#FCDE5A" opacity="0"/>
      <circle cx="270" cy="110" r="18" fill="none" stroke="#444441" stroke-width="2.5"/>
      <line x1="262" y1="102" x2="278" y2="118" stroke="#444441" stroke-width="2"/>
      <line x1="278" y1="102" x2="262" y2="118" stroke="#444441" stroke-width="2"/>
      <line x1="252" y1="110" x2="235" y2="110" stroke="#444441" stroke-width="3" stroke-linecap="round"/>
      <line x1="288" y1="110" x2="305" y2="110" stroke="#444441" stroke-width="3" stroke-linecap="round"/>
      <text class="th" x="270" y="66" text-anchor="middle" fill="#2BA1E6" id="lblR">R = 5 &#937;</text>

      <!-- Pila -->
      <rect x="240" y="230" width="80" height="20" rx="3" fill="#2C2C2A"/>
      <rect x="312" y="226" width="12" height="28" rx="2" fill="#97C459"/>
      <text class="t" x="250" y="245" fill="#ffffff">&#8211;</text>
      <text class="t" x="316" y="245" fill="#173404">+</text>
      <text class="th" x="280" y="282" text-anchor="middle" fill="#444441" id="lblV">E = 20 V</text>

      <!-- Incógnita corriente -->
      <text class="th" x="72" y="180" text-anchor="middle" fill="#444441" id="lblI">I = 4 A</text>

      <!-- Triángulo -->
      <polygon id="triHi" points="524,105 560,105 560,150 500,150" fill="#FCEBEB" stroke="none" opacity="0"/>
      <polygon points="560,40 500,150 620,150" fill="none" stroke="#185FA5" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="524" y1="105" x2="596" y2="105" stroke="#185FA5" stroke-width="2.5"/>
      <line x1="560" y1="105" x2="560" y2="150" stroke="#185FA5" stroke-width="2.5"/>
      <text class="th" x="560" y="82" text-anchor="middle" fill="#185FA5">V</text>
      <text class="th" x="540" y="138" text-anchor="middle" fill="#185FA5">I</text>
      <text class="th" x="580" y="138" text-anchor="middle" fill="#185FA5">R</text>
      <text class="th" x="560" y="182" text-anchor="middle" fill="#185FA5" id="triF" style="font-size:16px">I = V / R</text>

      <!-- Resultado grande -->
      <text class="th" x="560" y="245" text-anchor="middle" fill="#2BA1E6" id="bigRes" style="font-size:34px">4 A</text>
      <text class="ts" x="560" y="268" text-anchor="middle" fill="#888780" id="bigCap">Corriente</text>
    </svg>

    <div class="controls">
      <div class="row" id="rowV">
        <label>Tensión (V)</label>
        <input type="range" id="sV" min="1" max="50" step="1" value="20">
        <span class="val" id="vV">20 V</span>
      </div>
      <div class="row" id="rowR">
        <label>Resistencia (Ω)</label>
        <input type="range" id="sR" min="1" max="50" step="1" value="5">
        <span class="val" id="vR">5 &#937;</span>
      </div>
      <div class="row" id="rowI" style="display:none">
        <label>Corriente (A)</label>
        <input type="range" id="sI" min="1" max="20" step="0.5" value="4">
        <span class="val" id="vI">4 A</span>
      </div>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <p class="pie">Ingelearn · Educación en electrónica — Ley de Ohm: V = I × R</p>

<script>
(function(){
  var mode='I', V=20, R=5, I=4;
  function $(id){ return document.getElementById(id); }
  function fmt(n){ return (Math.round(n*100)/100).toString(); }

  function render(){
    if(mode==='I'){ I = V/R; }
    else if(mode==='V'){ V = I*R; }
    else { R = V/I; }

    $('lblV').textContent = 'E = '+fmt(V)+' V';
    $('lblR').textContent = 'R = '+fmt(R)+' \u03A9';
    $('lblI').textContent = 'I = '+fmt(I)+' A';

    $('lblV').setAttribute('fill', mode==='V' ? '#E24B4A' : '#444441');
    $('lblR').setAttribute('fill', mode==='R' ? '#E24B4A' : '#2BA1E6');
    $('lblI').setAttribute('fill', mode==='I' ? '#E24B4A' : '#444441');

    var tri={ I:'I = V / R', V:'V = I \u00D7 R', R:'R = V / I' };
    $('triF').textContent = tri[mode];

    var hi={
      V:'560,40 524,105 596,105',
      I:'524,105 560,105 560,150 500,150',
      R:'560,105 596,105 620,150 560,150'
    };
    $('triHi').setAttribute('points', hi[mode]);
    $('triHi').setAttribute('opacity','1');
    $('triHi').setAttribute('fill', mode==='V' ? '#E6F1FB' : '#FCEBEB');

    var res={ I:fmt(I)+' A', V:fmt(V)+' V', R:fmt(R)+' \u03A9' };
    var cap={ I:'Corriente', V:'Tensión', R:'Resistencia' };
    $('bigRes').textContent = res[mode];
    $('bigCap').textContent = cap[mode];

    var P=V*I, glow=Math.min(P/200,1);
    $('glow').setAttribute('opacity',(glow*0.85).toFixed(2));

    var dur=Math.max(0.4, 2.2 - I*0.12);
    $('flow').style.animationDuration = dur+'s';

    var m=$('msg'), txt='';
    m.classList.remove('warn');
    if(R<=1.2 && mode!=='R'){
      m.classList.add('warn');
      txt='<b>¡Ojo! Resistencia casi nula = cortocircuito.</b> La corriente se dispara ('+fmt(I)+' A) y la lámpara se sobrecalienta.';
    } else if(mode==='I'){
      txt='Subí la tensión y la corriente sube. Subí la resistencia y la corriente baja. La resistencia es fija: tensión y corriente se mueven juntas.';
    } else if(mode==='V'){
      txt='Para que circulen '+fmt(I)+' A por '+fmt(R)+' \u03A9, hace falta una tensión de '+fmt(V)+' V.';
    } else {
      txt='Con '+fmt(V)+' V empujando '+fmt(I)+' A, el resistor vale '+fmt(R)+' \u03A9.';
    }
    m.innerHTML = txt;

    $('vV').textContent=fmt(V)+' V';
    $('vR').textContent=fmt(R)+' \u03A9';
    $('vI').textContent=fmt(I)+' A';
  }

  $('sV').addEventListener('input',function(){ V=+this.value; render(); });
  $('sR').addEventListener('input',function(){ R=+this.value; render(); });
  $('sI').addEventListener('input',function(){ I=+this.value; render(); });

  var btns=document.querySelectorAll('#mode button');
  btns.forEach(function(b){
    b.addEventListener('click',function(){
      btns.forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
      mode=b.getAttribute('data-m');
      $('rowV').style.display = (mode==='V')?'none':'flex';
      $('rowR').style.display = (mode==='R')?'none':'flex';
      $('rowI').style.display = (mode==='I')?'none':'flex';
      render();
    });
  });

  render();
})();
</script>
</body>
</html>
